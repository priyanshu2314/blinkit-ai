spring.application.name=backend

# Load a local .env file (if present) as properties. optional: means the app
# still starts fine when the file is missing. The .env file is git-ignored.
spring.config.import=optional:file:./.env[.properties]

# Anthropic API key. Resolved from (in order): the .env file, or an
# ANTHROPIC_API_KEY environment variable. Blank when neither is set, in which
# case the app uses its built-in offline recipe book.
anthropic.api-key=${ANTHROPIC_API_KEY:}
